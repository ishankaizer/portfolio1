<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf7f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#131017" media="(prefers-color-scheme: dark)" />

    <title>Ishan Kaizer — Product &amp; UX Designer</title>
    <meta
      name="description"
      content="Ishan Kaizer is a product, UX/UI and industrial designer. End-to-end experiences across hardware and interfaces — case studies in mobile UX, connected products and shipped software."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ishan Kaizer",
        "jobTitle": "Product & UX Designer",
        "description": "Product, UX/UI and industrial designer working end-to-end across hardware and interfaces.",
        "url": "https://portfolio1-ishankaizer.vercel.app",
        "email": "mailto:ishankaizer@gmail.com",
        "address": { "@type": "PostalAddress", "addressLocality": "Bengaluru", "addressCountry": "IN" },
        "alumniOf": "Vellore Institute of Technology",
        "knowsAbout": ["Product Design", "UX/UI Design", "Industrial Design", "Design Systems", "3D Visualization"],
        "sameAs": [
          "https://linkedin.com/in/ishankaizer",
          "https://behance.net/ishankaizer"
        ]
      }
    </script>

    <!-- Set theme before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
